<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 924" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="How the whole supplier-invoice system works, end to end">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1,1 L10,6 L1,11" fill="none" stroke="#2e6a52" stroke-width="2.2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="924" fill="#ffffff"/>
  <text x="470" y="44" text-anchor="middle" font-size="28" font-weight="700" fill="#0f2b21">How the whole system works</text>
  <text x="470" y="74" text-anchor="middle" font-size="18" fill="#2e6a52">From wherever an invoice lands, to accurate costs in Optomate — and everything checking it went right.</text>

  <!-- BAND 1: CAPTURE -->
  <text x="40" y="112" font-size="20" font-weight="700" fill="#0f2b21">1 · Capture — every invoice, however it arrives</text>
  <rect x="40"  y="126" width="270" height="78" rx="14" fill="#ffffff" stroke="#438F73" stroke-width="2"/>
  <rect x="335" y="126" width="270" height="78" rx="14" fill="#ffffff" stroke="#438F73" stroke-width="2"/>
  <rect x="630" y="126" width="270" height="78" rx="14" fill="#ffffff" stroke="#438F73" stroke-width="2"/>
  <text x="175" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">📧 Supplier emails</text>
  <text x="175" y="189" text-anchor="middle" font-size="16" fill="#2e6a52">5 suppliers → info@ inbox</text>
  <text x="470" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">📄 Eye CU statement</text>
  <text x="470" y="189" text-anchor="middle" font-size="16" fill="#2e6a52">monthly, by email</text>
  <text x="765" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">🖨️ Paper invoices</text>
  <text x="765" y="189" text-anchor="middle" font-size="16" fill="#2e6a52">scanned to a watched folder</text>
  <path d="M175,204 L175,236" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M470,204 L470,236" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M765,204 L765,236" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- BAND 2: ENGINE -->
  <rect x="40" y="240" width="860" height="200" rx="16" fill="#e8f2ee" stroke="#438F73" stroke-width="2"/>
  <text x="60" y="272" font-size="20" font-weight="700" fill="#0f2b21">2 · The engine — runs every night, 7:30pm, on the practice PC</text>
  <g>
    <rect x="60"  y="288" width="148" height="76" rx="12" fill="#438F73"/>
    <rect x="228" y="288" width="148" height="76" rx="12" fill="#438F73"/>
    <rect x="396" y="288" width="148" height="76" rx="12" fill="#438F73"/>
    <rect x="564" y="288" width="148" height="76" rx="12" fill="#438F73"/>
    <rect x="732" y="288" width="148" height="76" rx="12" fill="#438F73"/>
    <text x="134" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Fetch</text>
    <text x="134" y="345" text-anchor="middle" font-size="14" fill="#eaf5f0">email + scans</text>
    <text x="302" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Read invoice</text>
    <text x="302" y="345" text-anchor="middle" font-size="14" fill="#eaf5f0">pull line items</text>
    <text x="470" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Match</text>
    <text x="470" y="345" text-anchor="middle" font-size="14" fill="#eaf5f0">your codes ↔ theirs</text>
    <text x="638" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Build arrival</text>
    <text x="638" y="345" text-anchor="middle" font-size="14" fill="#eaf5f0">+ freight / GST</text>
    <text x="806" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Write</text>
    <text x="806" y="345" text-anchor="middle" font-size="14" fill="#eaf5f0">gated, supervised</text>
    <path d="M209,326 L227,326" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M377,326 L395,326" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M545,326 L563,326" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M713,326 L731,326" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>
  </g>
  <rect x="60" y="384" width="820" height="38" rx="10" fill="#fff7e6" stroke="#b8860b" stroke-width="2"/>
  <text x="470" y="409" text-anchor="middle" font-size="15" font-weight="600" fill="#8a6100">🛡 Safeguards · never double-enters · date-window · totals must tie · all-or-nothing · off-switch</text>
  <path d="M470,440 L470,470" fill="none" stroke="#2e6a52" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- BAND 3: OPTOMATE -->
  <rect x="180" y="474" width="580" height="78" rx="16" fill="#0f2b21"/>
  <text x="470" y="509" text-anchor="middle" font-size="23" font-weight="700" fill="#ffffff">✔ Optomate</text>
  <text x="470" y="536" text-anchor="middle" font-size="16" fill="#cfe4da">cost of goods &amp; supplier summaries now accurate</text>
  <text x="470" y="576" text-anchor="middle" font-size="15" fill="#2e6a52">credit notes are entered too — as Supplier Credits</text>

  <line x1="40" y1="600" x2="900" y2="600" stroke="#d5e4dd" stroke-width="2"/>

  <!-- BAND 4: WATCHDOGS -->
  <text x="40" y="632" font-size="20" font-weight="700" fill="#0f2b21">3 · It watches itself</text>
  <rect x="40"  y="646" width="270" height="78" rx="14" fill="#f3f9f6" stroke="#438F73" stroke-width="2"/>
  <rect x="335" y="646" width="270" height="78" rx="14" fill="#f3f9f6" stroke="#438F73" stroke-width="2"/>
  <rect x="630" y="646" width="270" height="78" rx="14" fill="#f3f9f6" stroke="#438F73" stroke-width="2"/>
  <text x="175" y="682" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">Every invoice</text>
  <text x="175" y="709" text-anchor="middle" font-size="16" fill="#2e6a52">totals tie to the cent</text>
  <text x="470" y="682" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">Every night</text>
  <text x="470" y="709" text-anchor="middle" font-size="16" fill="#2e6a52">dupes · $0 · off-switch · stale</text>
  <text x="765" y="682" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">Every month</text>
  <text x="765" y="709" text-anchor="middle" font-size="16" fill="#2e6a52">statement vs Optomate</text>

  <line x1="40" y1="752" x2="900" y2="752" stroke="#d5e4dd" stroke-width="2"/>

  <!-- BAND 5: OUTPUTS -->
  <text x="40" y="784" font-size="20" font-weight="700" fill="#0f2b21">4 · What you see</text>
  <rect x="40"  y="798" width="270" height="78" rx="14" fill="#ffffff" stroke="#438F73" stroke-width="2"/>
  <rect x="335" y="798" width="270" height="78" rx="14" fill="#ffffff" stroke="#438F73" stroke-width="2"/>
  <rect x="630" y="798" width="270" height="78" rx="14" fill="#ffffff" stroke="#438F73" stroke-width="2"/>
  <text x="175" y="834" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">🧾 CEC Hub tile</text>
  <text x="175" y="861" text-anchor="middle" font-size="16" fill="#2e6a52">✅ all good / ⚠️ needs a look</text>
  <text x="470" y="834" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">📊 Monthly report</text>
  <text x="470" y="861" text-anchor="middle" font-size="16" fill="#2e6a52">COGS by supplier + trend</text>
  <text x="765" y="834" text-anchor="middle" font-size="20" font-weight="700" fill="#0f2b21">📥 Waiting-for-you</text>
  <text x="765" y="861" text-anchor="middle" font-size="16" fill="#2e6a52">new / unknown + issues</text>

  <text x="470" y="904" text-anchor="middle" font-size="15" fill="#6b8078">All code is backed up nightly to Google Drive.</text>
</svg>
